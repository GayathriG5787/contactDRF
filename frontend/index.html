<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Directory</title>

    <!-- Bootstrap CDN link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <!-- Bootstrap icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Custom stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container mt-5" style="max-width: 600px">
      <h1 class="mb-4 text-center fw-bold text-white">Contact Directory</h1>

      <div
        id="errorMessage"
        class="alert alert-danger d-none"
        role="alert"
      ></div>

      <div class="glass-card p-4 mb-4">
        <form id="contactForm">
          <div class="mb-3">
            <label for="name" class="custom-label">
              Name <span class="required">*</span>
            </label>
            <input
              type="text"
              id="name"
              class="form-control"
              placeholder="Enter full name"
              required
            />
          </div>

          <div class="mb-3">
            <label for="phone" class="custom-label">
              Phone <span class="required">*</span>
            </label>
            <input
              type="text"
              id="phone"
              class="form-control"
              placeholder="Enter phone number"
              required
            />
          </div>

          <div class="mb-3">
            <label for="email" class="custom-label"> Email </label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Enter email address"
            />
          </div>

          <button class="btn btn-primary w-100" type="submit">
            Save Contact
          </button>
        </form>
      </div>

      <hr />

      <div id="contactList"></div>

      <template id="contact-template">
        <div class="card glass-card mb-3">
          <div
            class="card-body p-4 d-flex justify-content-between align-items-center"
          >
            <div class="contact-details-container">
              <h5 class="contact-name fw-bold mb-2 text-white"></h5>
              <p
                class="contact-phone text-muted mb-1"
                style="font-size: 0.95rem"
              ></p>
              <p
                class="contact-email text-muted mb-0"
                style="font-size: 0.95rem"
              ></p>
            </div>

            <div
              class="action-buttons-container d-flex gap-2 align-items-center"
            >
              <button class="icon-btn edit-btn" title="Edit Contact">
                <i class="bi bi-pencil-square"></i>
              </button>
              <button class="icon-btn delete-btn" title="Delete Contact">
                <i class="bi bi-trash3-fill"></i>
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- tabindex = -1 removes the element from keyboard navigation -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg mx-3">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Edit Contact</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">
            <div
              id="editErrorMessage"
              class="alert alert-danger d-none"
              role="alert"
            ></div>
            <div class="mb-3">
              <label for="editName" class="custom-label">
                Name <span class="required">*</span>
              </label>
              <input
                type="text"
                id="editName"
                class="form-control"
                placeholder="Name"
                required
              />
            </div>
            <div class="mb-3">
              <label for="editPhone" class="custom-label">
                Phone <span class="required">*</span>
              </label>
              <input
                type="text"
                id="editPhone"
                class="form-control"
                placeholder="Phone"
                required
              />
            </div>
            <div>
              <label for="editEmail" class="custom-label"> Email </label>
              <input
                type="email"
                id="editEmail"
                class="form-control"
                placeholder="Email"
              />
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
            <button id="updateBtn" class="btn btn-sm btn-primary">
              Update
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Delete Contact</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">
            Are you sure you want to delete this contact?
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>

            <button id="confirmDeleteBtn" type="button" class="btn btn-danger">
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1100">
      <div
        id="successToast"
        class="toast align-items-center text-white bg-success border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body">Contact saved successfully!</div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <script src="main.js"></script>
  </body>
</html>
