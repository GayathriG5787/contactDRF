<!doctype html>
<html>
  <head>
    <title>Contact Directory</title>

    <!-- Bootstrap CDN link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <div class="container mt-5">
      <h1 class="mb-4">Contact Directory</h1>

      <form id="contactForm">
        <input
          type="text"
          id="name"
          class="form-control mb-3"
          placeholder="Name"
        />

        <input
          type="text"
          id="phone"
          class="form-control mb-3"
          placeholder="Phone"
        />

        <input
          type="email"
          id="email"
          class="form-control mb-3"
          placeholder="Email"
        />

        <button class="btn btn-primary" type="submit">Save Contact</button>
      </form>

      <hr />

      <div id="contactList"></div>

      <template id="contact-template">
        <div class="card mb-3">
          <div class="card-body">
            <h5 class="contact-name"></h5>

            <p class="contact-phone"></p>

            <p class="contact-email"></p>

            <button class="btn btn-warning edit-btn">Edit</button>

            <button class="btn btn-danger delete-btn">Delete</button>
          </div>
        </div>
      </template>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Contact</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <input type="text" id="editName" class="form-control mb-3" />

            <input type="text" id="editPhone" class="form-control mb-3" />

            <input type="email" id="editEmail" class="form-control" />
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>

            <button id="updateBtn" class="btn btn-primary">Update</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <!-- Custom JS -->
    <script src="main.js"></script>
  </body>
</html>
